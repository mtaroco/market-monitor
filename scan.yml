name: Daily Market Scan

on:
  schedule:
    # 10:00 UTC = 07:00 Uruguay (UTC-3). Lun-Sáb (datos del cierre US previo).
    - cron: '0 10 * * 1-6'
  workflow_dispatch:        # permite correrlo a mano desde la pestaña Actions

# Permiso para que el Action pueda commitear data.json y el caché de vuelta
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scanner
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python3 fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json data_cache/ || true
          # commitea solo si hubo cambios (evita corridas vacías que fallan)
          git diff --staged --quiet || git commit -m "data: scan $(date -u +%Y-%m-%d)"
          git push
